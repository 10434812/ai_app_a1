name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: ai_app_ci
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -p123456"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            admin/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install admin deps
        working-directory: admin
        run: npm ci

      - name: Backend typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Backend build
        working-directory: backend
        run: npm run build

      - name: Backend test (E2E included)
        working-directory: backend
        env:
          NODE_ENV: test
          JWT_SECRET: ci_jwt_secret_123456
          DB_HOST: 127.0.0.1
          DB_PORT: "3307"
          DB_USER: root
          DB_PASSWORD: 123456
          DB_NAME_TEST: ai_app_ci_test
          REDIS_URL: redis://127.0.0.1:6379
          WX_PAY_MOCK: "true"
          ENABLE_ADMIN_SEED: "false"
        run: npm test

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend tests
        working-directory: frontend
        run: npm test

      - name: Admin typecheck
        working-directory: admin
        run: npm run typecheck

      - name: Admin build
        working-directory: admin
        run: npm run build

      - name: Admin tests
        working-directory: admin
        run: npm test
