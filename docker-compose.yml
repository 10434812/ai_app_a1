name: ai_app

services:
  mysql:
    image: mysql:8.0
    container_name: ai_app_mysql
    restart: always
    ports:
      - '3307:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-ai_app}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-123456}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: ai_app_backend
    restart: always
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=${DB_NAME:-ai_app}
      - REDIS_DISABLED=true
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_123456}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001}
      # Add your API keys here or in a .env file
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
    depends_on:
      - mysql
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: ai_app_frontend
    restart: always
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - app-network

  admin:
    build: ./admin
    container_name: ai_app_admin
    restart: always
    ports:
      - '3001:80'
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    name: ai_app_app-network
    driver: bridge

volumes:
  mysql_data:
